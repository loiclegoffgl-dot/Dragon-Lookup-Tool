<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Search Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🐉 Dragon Search Dashboard</h1>
        
        <!-- Search Dragon Section -->
        <div class="card search-section">
            <h2>Search Dragon</h2>
            <div class="form-group">
                <label for="dragonName">Dragon ID:</label>
                <input type="text" id="dragonName" placeholder="e.g., D_HISTORICAL_OWL" />
            </div>
            
            <div class="form-group">
                <label for="dateFrom">From Date:</label>
                <input type="date" id="dateFrom" />
            </div>
            
            <div class="form-group">
                <label for="dateTo">To Date:</label>
                <input type="date" id="dateTo" />
            </div>
            
            <button id="searchDragonBtn" class="btn btn-primary">Search Dragon</button>
        </div>

        <!-- Find Unused Dragons Section -->
        <div class="card unused-section">
            <h2>Find Unused Dragons</h2>
            <div class="form-group">
                <label for="pastDays">Past Days:</label>
                <input type="number" id="pastDays" placeholder="e.g., 90" min="1" />
            </div>
            
            <button id="searchUnusedBtn" class="btn btn-secondary">Search Unused</button>
        </div>

        <!-- Results Section -->
        <div class="card results-section" id="resultsSection" style="display: none;">
            <h2>Results</h2>
            <div id="resultsContainer"></div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner" style="display: none;">
            <div class="spinner-border"></div>
            <p>Loading results...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
